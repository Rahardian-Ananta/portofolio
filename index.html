<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gart's 3D Merger</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* HEADER STYLE */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 20px; color: #007bff; }
        
        .status-container { display: flex; align-items: center; gap: 15px; }
        
        #status { font-size: 13px; color: #00ff00; }

        #exportBtn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        #exportBtn:hover { background: #218838; transform: translateY(-1px); }
        #exportBtn:disabled { background: #444; cursor: not-allowed; transform: none; }

        canvas { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">GART'S GLB MERGER</div>
        <div class="status-container">
            <div id="status">Menginisialisasi...</div>
            <button id="exportBtn" disabled>DOWNLOAD GLB</button>
        </div>
    </header>

    <script src="https://unpkg.com/meshoptimizer@0.21.0/meshopt_decoder.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mixer;
        let mainModel = null;
        let animations = [];
        const clock = new THREE.Clock();

        const loader = new GLTFLoader();
        loader.setMeshoptDecoder(MeshoptDecoder);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            // Perspective Camera: Membuat objek terlihat makin besar saat mendekat
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 6); // Posisi mata manusia (agak tinggi)

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // Pencahayaan biar model terlihat jelas
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            animate();
            loadFilesSequentially();
        }

        async function loadFilesSequentially() {
            try {
                updateStatus("Memuat Model...");
                
                const gltfMain = await loadGLB('3d_model.glb');
                mainModel = gltfMain.scene;
                animations = [...gltfMain.animations];

                /* PERBAIKAN ARAH:
                   Jika model berjalan ke kanan, kita putar modelnya 90 derajat (PI/2) 
                   agar arah "maju"-nya menghadap ke kamera. 
                   Coba ganti angka Math.PI / 2 di bawah jika arahnya masih salah.
                */
                mainModel.rotation.y = Math.PI / 2; // Putar 90 derajat
                
                scene.add(mainModel);

                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                controls.target.set(center.x, 1, center.z); // Fokus ke area badan model

                updateStatus("Memuat Animasi...");

                const gltfAnim = await loadGLB('animation.glb');
                if (gltfAnim.animations.length > 0) {
                    animations = [...animations, ...gltfAnim.animations];
                    
                    if (mixer) mixer.stopAllAction();
                    mixer = new THREE.AnimationMixer(mainModel);
                    const action = mixer.clipAction(gltfAnim.animations[0]);
                    action.play();

                    document.getElementById('exportBtn').disabled = false;
                    updateStatus("Siap untuk di-download");
                } else {
                    updateStatus("Animasi tidak ditemukan.");
                }

            } catch (error) {
                console.error(error);
                updateStatus("Error: Pastikan file glb ada di folder.");
            }
        }

        function loadGLB(url) {
            return new Promise((resolve, reject) => {
                loader.load(url, (g) => resolve(g), undefined, (e) => reject(e));
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (mixer) mixer.update(clock.getDelta());
            controls.update();
            renderer.render(scene, camera);
        }

        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!mainModel) return;
            updateStatus("Mengekspor...");

            const exporter = new GLTFExporter();
            exporter.parse(mainModel, (result) => {
                const blob = new Blob([result], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'fixed_animation.glb';
                link.click();
                updateStatus("Berhasil!");
            }, (err) => {
                updateStatus("Gagal Ekspor.");
            }, { binary: true, animations: animations });
        });

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
